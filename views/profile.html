<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="theme-color" content="#5A39FF">

	<!-- 파비콘 -->
	<link rel="shortcut icon" href="/public/images/logo.svg" />

	<!-- 구글 폰트 -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;700&display=swap&subset=latin"
		rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap&subset=korean"
		rel="stylesheet">

	<!-- 부트스트랩 -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous" />

	<!-- 내부 CSS -->
	<link rel="stylesheet" href="/public/stylesheets/main.css" />
	<link rel="stylesheet" href="/public/stylesheets/profile.css" />
	<link rel="stylesheet" href="/public/stylesheets/card.css" />

	<!-- 내부 JS -->
	<script src="/public/scripts/main.js"></script>
	<script src="/public/scripts/profile.js"></script>
	<script src="/public/scripts/cards.js"></script>

	<title>뮤집 - 피드</title>
</head>

<body>
	<div id="profile">
		<div class="content">
			<div class="first-section">
				<div id="profile-header">
					<button type="button" class="btn">
						<img class="logo" src="/public/images/ic24-arrow-left.svg" alt="뒤로">
					</button>
					<div class="right-icon-group">
						<button type="button" class="btn">
							<img src="/public/images/ic24-notification.svg" alt="종">
						</button>
						<button type="button" class="my-profile-image btn">
							<img src="/public/images/Ellipse 22.jpg" alt="프로필 사진">
						</button>
					</div>
				</div>
				<div id="profile-information">
					<img class="profile-image" src="/public/images/person.svg"/>
					<div class="name">김뮤지</div>
					<div class="id">
						<span class="id-text">muji_kim</span>
						<img src="/public/images/instargram-icon-gray.svg" />
					</div>
					<button class="follow-button btn btn-fill">
						팔로우
					</button>
				</div>
			</div>

			<div id="card-list">
				<!-- 이곳에 피드 카드가 삽입됩니다. -->
			</div>

		</div>
	</div>
</body>

</html>
