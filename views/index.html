<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 파비콘 -->
    <link rel="shortcut icon" href="./../public/images/logo_.jpeg">

    <!-- 구글 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@200;400&display=swap" rel="stylesheet">

    <!-- 부트스트랩 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">

    <!-- 내부 메인 CSS -->
    <link rel="stylesheet" href="./../public/stylesheets/main.css">

    <title>뮤집</title>

    <!-- 내부 index CSS -->
    <link rel="stylesheet" href="../public/stylesheets/index.css">

    <!-- Google Map API JS -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>

    <!-- 내부 index JS -->
    <script src="../public/scripts/map.js"></script>
    <script src="../public/scripts/index.js"></script>
</head>

<body>
    <div class="h-100">
        <div id="map" class="h-100"></div>

        <!-- Async script executes immediately and must be after any DOM elements used in callback. -->

        <!-- 맵을 비활성화 해두었습니다. 활성화가 필요하다면 '아래 스크립트 태그 주석'과 '해드 태그 내의 Google Map API JS 스크립트 태그 주석', 'map.js 파일의 상단의 주석'을 해제하십시오. -->
        <script
            src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDN-i5kYIaVnYgHVgIwFabg6ORayHadUss&callback=initMap&libraries=&v=weekly"
            async></script>
    </div>

    <div id="bottom-drawer">

    </div>

</body>
