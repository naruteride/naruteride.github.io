<section>
    <div class="knob">
        <div></div>
    </div>

    <div class="content">
        <div id="write-first-section-grid">
            <div class="input-field nickname">
                <input id="write-nickname" class="input-underline" type="text" placeholder="Anonymous" form="write-form"
                    name="nickname" required>
                <label for="write-nickname">닉네임</label>
            </div>
            <div class="input-field password">
                <input id="write-password" type="password" class="input-underline" placeholder="••••" form="write-form"
                    name="password" required>
                <label for="write-password">비밀번호</label>
            </div>
            <div class="album-name flex-vertical-alignment justify-content-between">
                <div class="input-field">
                    <input id="write-album-name" type="text" class="input-underline" placeholder="https://youtu.be/xXxxXxXXxXX"
                        form="write-form" name="youtubeAddress" required>
                    <label for="write-album-name">유튜브 공유 링크</label>
                </div>
                <!-- <button class="btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-search" viewBox="0 0 16 16">
                        <path
                            d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
                    </svg>
                </button> -->
            </div>
        </div>
    </div>
</section>
<section>
    <form id="write-form" class="content">
        <label for="write-content" class="form-label">게시글 내용</label>
        <textarea id="write-content" class="form-control" rows="12" placeholder="곡에 대한 당신의 의견을 알려주세요..."
            name="content"></textarea>
        <input id="write-submit" class="btn btn-primary w-100" type="submit" value="저장">
    </form>
</section>
