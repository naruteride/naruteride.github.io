<section>
    <div class="knob">
        <div></div>
    </div>

    <div class="content">
        <div id="write-first-section-grid">
            <div class="input-field nickname">
                <input id="write-nickname" class="input-underline" type="text" placeholder="anonymous" form="write-form" name="nickname" required>
                <label for="write-nickname">닉네임</label>
            </div>
            <div class="input-field password">
                <input id="write-password" type="password" class="input-underline" placeholder="••••" form="write-form" name="password" required>
                <label for="write-password">비밀번호</label>
            </div>
            <div class="input-field youtube-address">
                <input id="write-youtube-address" type="text" class="input-underline"
                    placeholder="https://youtu.be/xXxxXxXXxXX" form="write-form" name="youtubeAddress" required>
                <label for="write-youtube-address">유튜브 주소</label>
            </div>
        </div>
    </div>
</section>
<section>
    <form id="write-form" class="content">
        <label for="write-content" class="form-label">게시글 내용</label>
        <textarea id="write-content" class="form-control" rows="12" placeholder="곡에 대한 당신의 의견을 알려주세요..." name="content"></textarea>
        <input id="write-submit" class="btn btn-primary w-100" type="submit" value="저장">
    </form>
</section>

<link rel="stylesheet" href="/public/stylesheets/post.css">
