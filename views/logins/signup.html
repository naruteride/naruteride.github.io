<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 파비콘 -->
    <link rel="shortcut icon" href="../../public/images/logo_.jpeg" />

    <!-- 구글 폰트 -->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@200;400&display=swap"
      rel="stylesheet"
    />

    <!-- 부트스트랩 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x"
      crossorigin="anonymous"
    />

    <!-- 내부 CSS -->
    <link rel="stylesheet" href="../../public/stylesheets/main.css" />
    <link rel="stylesheet" href="../../public/stylesheets/login.css" />

    <title>뮤집 - 회원가입 (1/2)</title>

    <script src="../../public/scripts/signup.js"></script>
  </head>

  <body>
    <div id="signUp">
      <div class="logo">
        <img src="../../public/images/로고.svg" alt="로고" />
      </div>
      <div class="title">Mugip 회원가입</div>
      <form class="form-box" method="post">
        <div class="input-container">
          이메일 <input class="text-field" type="email" name="email" />
        </div>

        <div class="input-container nickname">
          닉네임 <input class="text-field" type="text" name="nickname" />
        </div>

        <div class="input-container">
          비밀번호
          <input class="text-field" type="password" name="password" />
        </div>

        <div class="input-container">
          비밀번호 확인
          <input class="text-field" type="password" />
        </div>

        <button
          class="btn button signup"
          href="#"
        >
          MUGIP과 함께하기
        </button>
      </form>
    </div>
  </body>
</html>
