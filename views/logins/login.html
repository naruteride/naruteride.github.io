<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 파비콘 -->
    <link rel="shortcut icon" href="../../public/images/logo_.jpeg" />

    <!-- 구글 폰트 -->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@200;400&display=swap"
      rel="stylesheet"
    />

    <!-- 부트스트랩 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x"
      crossorigin="anonymous"
    />

    <!-- 내부 CSS -->
    <link rel="stylesheet" href="../../public/stylesheets/main.css" />
    <link rel="stylesheet" href="../../public/stylesheets/login.css" />

    <title>뮤집 - 로그인</title>
  </head>

  <body>
    <div id="Login">
      <div class="logo">
        <img src="../../public/images/로고.svg" alt="로고" />
      </div>
      <div class="title">Mugip</div>
      <form class="form-box" method="post">
        <input
          class="text-field"
          type="email"
          name="email"
          placeholder="아이디"
        />
        <input
          class="text-field"
          type="password"
          name="password"
          placeholder="비밀번호"
        />
        <button class="btn button login" type="submit">
          로그인
        </button>
        <a href="./signup.html" class="btn button signup">
          MUGIP과 함께하기
        </a>
        <div class="search">
          <a class="btn text-point" href="#">아이디 찾기</a> |
          <a class="btn text-point" href="#">비밀번호 찾기</a>
        </div>
      </form>

      <hr />

      <button class="btn button sociall kakao">
        kakaosociallogin
      </button>
      <button class="btn button sociall google">
        googlesociallogin
      </button>
    </div>
  </body>
</html>
