<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 파비콘 -->
    <link rel="shortcut icon" href="../../public/images/logo_.jpeg">

    <!-- 구글 폰트 -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@200;400&display=swap" rel="stylesheet">

    <!-- 부트스트랩 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">

    <!-- 내부 메인 CSS -->
    <link rel="stylesheet" href="../../public/stylesheets/main.css">

    <title>뮤집 - 로그인</title>

    <script src="../../public/scripts/login.js"></script>
</head>

<body>
    <div id="login-background" class="position-absolute">
        <div class="">

        </div>
    </div>
    
    <div class="d-flex justify-content-center align-items-center vw-100 vh-100 px-3">
        <form id="login-card" class="card form-group shadow">
            <div class="card-header display-6 p-4 letter-spacing-2">
                로그인
            </div>
            
            <div class="w-100 h-100 d-flex flex-wrap justify-content-center align-content-around p-3 bg-white">
                <div class="input-field">
                    <input id="login-id" type="email" class="input-underline" placeholder="yourmail@email.com">
                    <label for="login-id">이메일</label>
                </div>

                <div class="input-field">
                    <input id="login-pw" type="password" class="input-underline" placeholder="•••••••••">
                    <label for="login-pw">비밀번호</label>
                </div>

                <div class="input-field">
                    <input type="submit" class="btn btn-primary w-100" value="로그인">
                </div>

                <a href="./signup.html">아직 이메일 계정이 없나요?</a>
            </div>
        </form>
    </div>
</body>

</html>
